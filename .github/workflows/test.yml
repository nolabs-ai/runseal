name: Runseal Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Basic sandbox
        uses: always-further/runseal@main
        with:
          run: printf "runseal smoke ok\n"
          runseal-version: source
          policy: |
            fs:
              read: ["."]
              write: []
            network:
              mode: blocked

      - name: Secret is not exposed to command
        uses: always-further/runseal@main
        env:
          RUNSEAL_QA_API_TOKEN: ${{ secrets.RUNSEAL_QA_API_TOKEN }}
        with:
          run: |
            test -z "$RUNSEAL_QA_API_TOKEN"
            printf "secret stripped ok\n"
          runseal-version: source
          policy: |
            fs:
              read: ["."]
              write: []
            network:
              mode: filtered
            access:
              api:
                secret: RUNSEAL_QA_API_TOKEN
                url: https://example.com
                allow:
                  - GET /**
