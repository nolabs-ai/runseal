name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build release binaries
    if: github.repository == 'always-further/runseal'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          asset="runseal-v${version}-${{ matrix.target }}.tar.gz"
          mkdir -p dist/pkg
          cp "target/${{ matrix.target }}/release/runseal" dist/pkg/runseal
          chmod 0755 dist/pkg/runseal
          tar -C dist/pkg -czf "dist/${asset}" runseal
          (cd dist && sha256sum "${asset}" > SHA256SUMS)
          echo "asset=dist/${asset}" >> "${GITHUB_OUTPUT}"

      - name: Attest release assets
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            ${{ steps.package.outputs.asset }}
            dist/SHA256SUMS

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Runseal ${GITHUB_REF_NAME}"
          gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz dist/SHA256SUMS --clobber
