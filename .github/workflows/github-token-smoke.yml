name: GitHub Token Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  github-token:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: GitHub PAT is injected only for allowed API route
        uses: always-further/runseal@main
        env:
          RUNSEAL_GITHUB_PAT: ${{ secrets.RUNSEAL_GITHUB_PAT }}
        with:
          run: |
            set -euo pipefail
            test -z "$RUNSEAL_GITHUB_PAT"
            curl -fsS \
              -H "Authorization: Bearer ${RUNSEAL_CRED_cred_0}" \
              -H "Accept: application/vnd.github+json" \
              "${CRED_0_BASE_URL}/user" >/dev/null
            printf "github PAT injected ok\n"
          runseal-version: source
          verify-attestations: false
          policy: |
            fs:
              read: ["."]
              write: []
            network:
              default: blocked
            credentials:
              RUNSEAL_GITHUB_PAT:
                host: api.github.com
                inject:
                  mode: header
                endpoints:
                  - method: GET
                    path: "/user"
