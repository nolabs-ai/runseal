name: GitHub Token Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  github-token:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: GitHub PAT is injected only for allowed API route
        uses: always-further/runseal@main
        env:
          RUNSEAL_GITHUB_PAT: ${{ secrets.RUNSEAL_GITHUB_PAT }}
        with:
          run: |
            set -euo pipefail
            test -z "${RUNSEAL_GITHUB_PAT:-}"
            test -n "${RUNSEAL_ACCESS_GITHUB_TOKEN:-}"
            printf "raw github PAT stripped: yes\n"
            printf "phantom credential present: yes len=%s prefix=%s\n" "${#RUNSEAL_ACCESS_GITHUB_TOKEN}" "${RUNSEAL_ACCESS_GITHUB_TOKEN:0:8}"
            curl -fsS \
              -H "Authorization: Bearer ${RUNSEAL_ACCESS_GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${GITHUB_BASE_URL}/user"
            printf "github PAT injected ok\n"
          runseal-version: source
          policy: |
            fs:
              read: ["."]
              write: []
            network:
              mode: filtered
            access:
              github:
                secret: RUNSEAL_GITHUB_PAT
                url: https://api.github.com
                allow:
                  - GET /user
