name: QA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-qa:
    name: Local Runseal QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout runseal
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Checkout nono
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: always-further/nono
          path: nono
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev \
            pkg-config

      - name: Build nono
        working-directory: nono
        run: cargo build --release --locked

      - name: Put nono on PATH
        run: echo "$PWD/nono/target/release" >> "$GITHUB_PATH"

      - name: Run local QA harness
        run: scripts/run-local-qa.sh
        env:
          RUNSEAL_QA_API_TOKEN: ${{ secrets.RUNSEAL_QA_API_TOKEN }}
