name: QA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-qa:
    name: Local Runseal QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout runseal
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout nono
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: always-further/nono
          path: nono
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev \
            pkg-config

      - name: Build nono
        working-directory: nono
        run: cargo build --release --locked

      - name: Put nono on PATH
        run: echo "$PWD/nono/target/release" >> "$GITHUB_PATH"

      - name: Run local QA harness
        run: scripts/run-local-qa.sh
        env:
          RUNSEAL_QA_API_TOKEN: ${{ secrets.RUNSEAL_QA_API_TOKEN }}
