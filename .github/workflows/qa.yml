name: QA

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-qa:
    name: Local Runseal QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout runseal
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout nono
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: always-further/nono
          path: nono
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev \
            pkg-config

      - name: Build nono
        working-directory: nono
        run: cargo build --release --locked

      - name: Put nono on PATH
        run: echo "$PWD/nono/target/release" >> "$GITHUB_PATH"

      - name: Run local QA harness
        run: scripts/run-local-qa.sh
        env:
          RUNSEAL_QA_API_TOKEN: ${{ secrets.RUNSEAL_QA_API_TOKEN }}
